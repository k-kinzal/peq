name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  php-cs-fixer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ast
          tools: composer:v2
      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
      - run: composer lint:php-cs-fixer

  phpstan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ast
          tools: composer:v2
      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
      - run: composer lint:phpstan

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4', '8.5']
    name: "test (PHP ${{ matrix.php }})"
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ast
          tools: composer:v2
      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
      - run: composer test

  build:
    runs-on: ubuntu-latest
    needs: [php-cs-fixer, phpstan, test]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: ast
          tools: composer:v2
          ini-values: phar.readonly=0
      - uses: ramsey/composer-install@v3
        with:
          dependency-versions: highest
      - run: composer compile
      - uses: actions/upload-artifact@v4
        with:
          name: peq.phar
          path: dist/peq.phar
